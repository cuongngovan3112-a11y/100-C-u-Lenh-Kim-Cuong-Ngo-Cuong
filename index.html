<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💎 Diamond Prompt — Ngô Văn Cương</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07070a;
    --bg2: #0d0d12;
    --bg3: #121218;
    --card: #101016;
    --card-hover: #16161e;
    --border: #232333;
    --border-glow: #d4af3744;
    --gold: #d4af37;
    --gold2: #f9d976;
    --gold-dim: #8a732a;
    --teal: #00e5ff;
    --text: #f4f2ec;
    --text2: #b5b3ad;
    --text3: #75736e;
    --diamond: #00f0ff;
    --diamond2: #a8f4e8;
    --saved-bg: #15150c;
    --saved-border: #d4af3755;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 10px 40px rgba(0,0,0,0.6);
    --shadow-gold: 0 0 50px rgba(212,175,55,0.1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    line-height: 1.7;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Background texture ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 15% 50%, rgba(0,240,255,0.03), transparent 25%),
      radial-gradient(circle at 85% 30%, rgba(212,175,55,0.04), transparent 30%),
      radial-gradient(ellipse 40% 60% at 50% -10%, rgba(212,175,55,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  .header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 80px max(24px, calc((100vw - 1200px) / 2)) 50px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(212,175,55,0.05) 0%, transparent 100%);
  }

  .header-brand {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 5px;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .diamond-icon {
    font-size: 52px;
    display: block;
    margin: 0 auto 16px;
    filter: drop-shadow(0 0 25px rgba(0,240,255,0.5));
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .header h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(32px, 6vw, 64px);
    font-weight: 700;
    background: linear-gradient(135deg, var(--gold2) 0%, var(--gold) 40%, #ffeb99 60%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 3px;
    line-height: 1.15;
    margin-bottom: 16px;
  }

  .header-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 20px;
    color: var(--text2);
    letter-spacing: 1.5px;
    margin-bottom: 36px;
  }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
    margin-top: 30px;
  }

  .stat {
    text-align: center;
    padding: 16px 24px;
    background: rgba(212,175,55,0.05);
    border: 1px solid var(--border-glow);
    border-radius: var(--radius-sm);
    min-width: 110px;
    transition: transform 0.3s;
  }
  
  .stat:hover {
    transform: translateY(-2px);
    border-color: rgba(212,175,55,0.3);
  }

  .stat-num {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--gold);
    display: block;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ── CONTROLS ── */
  .controls {
    position: sticky;
    top: 0;
    z-index: 20;
    padding: 24px max(24px, calc((100vw - 1200px) / 2));
    background: rgba(7,7,10,0.92);
    backdrop-filter: blur(24px);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-wrap {
    flex: 1;
    min-width: 250px;
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 16px;
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 14px 48px 14px 46px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-input:focus {
    border-color: var(--gold-dim);
    box-shadow: 0 0 0 4px rgba(212,175,55,0.08);
  }

  .search-input::placeholder { color: var(--text3); }

  .clear-search {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 18px;
    padding: 2px;
    display: none;
  }

  .clear-search:hover { color: var(--text2); }

  .filter-btns {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 10px 18px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50px;
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }

  .filter-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
  .filter-btn.active { background: rgba(212,175,55,0.12); border-color: var(--gold); color: var(--gold); }

  .sort-btn {
    padding: 10px 20px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 50px;
    color: var(--text3);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
  }
  .sort-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

  /* ── RESULTS INFO ── */
  .results-info {
    padding: 20px max(24px, calc((100vw - 1200px) / 2)) 10px;
    position: relative;
    z-index: 1;
    color: var(--text3);
    font-size: 14px;
    letter-spacing: 0.5px;
  }

  /* ── GRID ── */
  .grid {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 28px;
    padding: 20px max(24px, calc((100vw - 1200px) / 2)) 80px;
  }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    position: relative;
    transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    animation: fadeUp 0.5s ease both;
    overflow: hidden;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    background: linear-gradient(135deg, rgba(212,175,55,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  .card:hover {
    transform: translateY(-5px);
    border-color: rgba(212,175,55,0.25);
    box-shadow: var(--shadow), var(--shadow-gold);
  }

  .card.saved {
    background: var(--saved-bg);
    border-color: var(--saved-border);
  }

  .card-number {
    position: absolute;
    top: 24px;
    right: 24px;
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--gold-dim);
    letter-spacing: 1px;
    opacity: 0.8;
  }

  .card-category {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    background: rgba(212,175,55,0.06);
    border: 1px solid rgba(212,175,55,0.15);
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    color: var(--gold-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .card-category-icon { font-size: 12px; }

  .card-prompt {
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.8;
    color: var(--text);
    margin-bottom: 20px;
    position: relative;
    font-weight: 300;
  }

  .card-prompt .highlight {
    background: rgba(212,175,55,0.2);
    border-radius: 3px;
    padding: 0 3px;
    color: var(--gold2);
  }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border-glow), transparent);
    margin-bottom: 18px;
  }

  .benefit-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 8px;
    opacity: 0.9;
  }

  .benefit-label::before {
    content: '';
    width: 18px;
    height: 1px;
    background: var(--teal);
    opacity: 0.7;
  }

  .card-benefit {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-style: italic;
    color: var(--text2);
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .card-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-top: 8px;
  }

  .btn-copy {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    background: rgba(212,175,55,0.06);
    border: 1px solid rgba(212,175,55,0.18);
    border-radius: var(--radius-sm);
    color: var(--gold);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 600;
  }

  .btn-copy:hover { background: rgba(212,175,55,0.15); border-color: var(--gold); }

  .btn-copy.copied {
    background: rgba(0,229,255,0.1);
    border-color: var(--teal);
    color: var(--teal);
  }

  .btn-save {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text3);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
  }

  .btn-save:hover { border-color: var(--gold-dim); color: var(--gold); }
  .btn-save.active { border-color: var(--gold); color: var(--gold); background: rgba(212,175,55,0.1); }

  .card-number-badge {
    margin-left: auto;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 1px;
    font-weight: 600;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 100px 20px;
    color: var(--text3);
  }

  .empty-icon {
    font-size: 56px;
    margin-bottom: 20px;
    opacity: 0.5;
  }

  .empty-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-style: italic;
  }

  /* ── FOOTER ── */
  .footer {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 40px max(24px, calc((100vw - 1200px) / 2)) 60px;
    border-top: 1px solid var(--border);
    color: var(--text3);
    font-size: 14px;
    letter-spacing: 1px;
  }

  .footer span {
    color: var(--gold-dim);
    font-family: 'Cinzel', serif;
    font-weight: 600;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: var(--card);
    border: 1px solid var(--gold-dim);
    border-radius: var(--radius-sm);
    padding: 14px 24px;
    color: var(--gold);
    font-size: 15px;
    font-weight: 500;
    z-index: 999;
    box-shadow: var(--shadow);
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .grid { grid-template-columns: 1fr; padding: 20px 16px 40px; }
    .header { padding: 60px 16px 40px; }
    .controls { padding: 16px; gap: 12px; }
    .filter-btn { font-size: 13px; padding: 8px 14px; }
    .stats-bar { gap: 20px; }
    .card { padding: 24px; }
    .header h1 { font-size: 28px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-brand">Ngô Văn Cương · 2026</div>
  <span class="diamond-icon">💎</span>
  <h1>Diamond Prompt</h1>
  <div class="header-sub">100 câu lệnh trải nghiệm đỉnh cao</div>
  <div class="stats-bar">

<div class="results-info" id="resultsInfo">Hiển thị 100 câu lệnh</div>

<!-- GRID -->
<main class="grid" id="grid"></main>

<!-- FOOTER -->
<footer class="footer">
  <p>💎 <span>Diamond Prompt</span> · Ngô Văn Cương · 2026 · 100 câu lệnh kim cương</p>
</footer>

<!-- TOAST -->
<div class="toast" id="toast">✓ Đã sao chép!</div>

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let saved = JSON.parse(localStorage.getItem('dp_saved') || '[]');
let currentCat = 'all';
let currentQuery = '';
let sortAsc = true;

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function highlight(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<span class="highlight">$1</span>');
}

function render() {
  const grid = document.getElementById('grid');
  const q = currentQuery.toLowerCase().trim();

  let filtered = prompts.filter(p => {
    const matchCat = currentCat === 'all' ? true
      : currentCat === 'saved' ? saved.includes(p.id)
      : p.cat === currentCat;
    const matchQ = !q || p.text.toLowerCase().includes(q) || p.benefit.toLowerCase().includes(q) || String(p.id).includes(q);
    return matchCat && matchQ;
  });

  if (!sortAsc) filtered = [...filtered].reverse();

  document.getElementById('showCount').textContent = filtered.length;
  document.getElementById('resultsInfo').textContent =
    filtered.length === 100 ? 'Hiển thị toàn bộ 100 câu lệnh kim cương'
    : `Hiển thị ${filtered.length} / 100 câu lệnh`;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">Không tìm thấy câu lệnh phù hợp</div></div>`;
    return;
  }

  grid.innerHTML = filtered.map((p, idx) => {
    const isSaved = saved.includes(p.id);
    const delay = Math.min(idx * 30, 400);
    return `
    <div class="card${isSaved ? ' saved' : ''}" style="animation-delay:${delay}ms" data-id="${p.id}">
      <span class="card-number">#${String(p.id).padStart(2,'0')}</span>
      <div class="card-category"><span class="card-category-icon">${p.catIcon}</span>${p.catLabel}</div>
      <div class="card-prompt">${highlight(p.text, currentQuery)}</div>
      <div class="divider"></div>
      <div class="benefit-label">Lợi ích ngắn gọn</div>
      <div class="card-benefit">${highlight(p.benefit, currentQuery)}</div>
      <div class="card-actions">
        <button class="btn-copy" onclick="copyPrompt(${p.id}, this)">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Sao chép
        </button>
        <button class="btn-save${isSaved ? ' active' : ''}" onclick="toggleSave(${p.id}, this)">
          ${isSaved ? '⭐' : '☆'} ${isSaved ? 'Đã lưu' : 'Lưu lại'}
        </button>
        <span class="card-number-badge">No.${p.id}/100</span>
      </div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════════
function copyPrompt(id, btn) {
  const p = prompts.find(x => x.id === id);
  if (!p) return;
  navigator.clipboard.writeText(p.text).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Đã sao chép!`;
    showToast('✓ Đã sao chép câu lệnh!');
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Sao chép`;
    }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = p.text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✓ Đã sao chép!');
  });
}

function toggleSave(id, btn) {
  if (saved.includes(id)) {
    saved = saved.filter(x => x !== id);
    showToast('Đã bỏ lưu câu lệnh');
  } else {
    saved.push(id);
    showToast('⭐ Đã lưu câu lệnh!');
  }
  localStorage.setItem('dp_saved', JSON.stringify(saved));
  document.getElementById('savedCount').textContent = saved.length;

  if (currentCat === 'saved') {
    render();
  } else {
    const card = btn.closest('.card');
    if (saved.includes(id)) {
      card.classList.add('saved');
      btn.classList.add('active');
      btn.textContent = '⭐ Đã lưu';
    } else {
      card.classList.remove('saved');
      btn.classList.remove('active');
      btn.textContent = '☆ Lưu lại';
    }
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ══════════════════════════════════════════════
// EVENT LISTENERS
// ══════════════════════════════════════════════
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    render();
  });
});

const searchInput = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearSearch');

searchInput.addEventListener('input', () => {
  currentQuery = searchInput.value;
  clearBtn.style.display = currentQuery ? 'block' : 'none';
  render();
});

clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  currentQuery = '';
  clearBtn.style.display = 'none';
  searchInput.focus();
  render();
});

document.getElementById('sortBtn').addEventListener('click', function() {
  sortAsc = !sortAsc;
  this.textContent = sortAsc ? 'Số thứ tự ↑' : 'Số thứ tự ↓';
  render();
});

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
document.getElementById('savedCount').textContent = saved.length;
render();
</script>
